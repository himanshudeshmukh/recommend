services:
  - type: web
    name: fashionpedia-api
    env: python
    region: oregon
    plan: free
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: WARM_MODEL_ON_STARTUP
        value: "false"
